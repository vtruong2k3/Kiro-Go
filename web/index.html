<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiro-Go</title>
  <link rel="icon" type="image/x-icon" href="/admin/favicon.ico" />
  <link rel="stylesheet" href="/admin/vendor/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="/admin/styles.css" id="__cssAsset" />
  <link rel="stylesheet" href="/admin/toast.css" id="__toastCss" />
  <script>
    (function () {
      var v = Date.now();
      window.__v = v;
      var css = document.getElementById('__cssAsset');
      if (css) css.href = '/admin/styles.css?v=' + v;
      var tcss = document.getElementById('__toastCss');
      if (tcss) tcss.href = '/admin/toast.css?v=' + v;
    })();
  </script>
</head>

<body>
  <!-- Login -->
  <div id="loginPage" class="login-wrapper">
    <div class="login-ambient" aria-hidden="true"></div>
    <header class="login-topbar">
      <div class="login-topbar-inner">
        <div class="brand" aria-label="Kiro-Go" data-i18n-aria-label="app.title">
          <img class="brand-icon" src="/admin/favicon.ico" alt="" />
          <span class="brand-text">Kiro-Go</span>
        </div>
        <div class="topbar-actions">
          <div class="lang-switch" id="loginLangSwitch" role="group" aria-label="" data-i18n-aria-label="lang.label">
            <button class="lang-btn" data-lang="zh" type="button" data-i18n="lang.zh"></button>
            <button class="lang-btn" data-lang="en" type="button" data-i18n="lang.en"></button>
            <button class="lang-btn" data-lang="vi" type="button" data-i18n="lang.vi"></button>
          </div>
          <span class="divider" aria-hidden="true"></span>
          <button id="loginThemeToggle" class="icon-btn theme-toggle" type="button" aria-label=""
            data-i18n-title="theme.toggle" data-i18n-aria-label="theme.toggle" data-theme="system">
            <i class="fa-solid fa-circle-half-stroke theme-ico-system"></i>
            <i class="fa-solid fa-sun theme-ico-light"></i>
            <i class="fa-solid fa-moon theme-ico-dark"></i>
          </button>
        </div>
      </div>
    </header>
    <main class="login-main">
      <div class="login-card" id="loginCard">
        <div class="login-brand-mark" aria-hidden="true">
          <img class="login-brand-icon" src="/admin/favicon.ico" alt="" />
        </div>
        <h1 class="login-title" data-i18n="login.title"></h1>
        <p class="login-subtitle" data-i18n="login.subtitle"></p>
        <form id="loginForm" class="login-form" autocomplete="on" novalidate>
          <div class="form-group">
            <label for="pwdField" data-i18n="login.password"></label>
            <div class="input-affix">
              <i class="fa-solid fa-lock affix-icon" aria-hidden="true"></i>
              <input type="password" id="pwdField" name="password"
                data-i18n-placeholder="login.passwordPlaceholder"
                autocomplete="current-password" required />
              <button type="button" class="affix-btn" id="pwdToggle" aria-label=""
                data-i18n-aria-label="login.showPassword" data-shown="false">
                <i class="fa-solid fa-eye" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <label class="remember-row" for="rememberPwd">
            <input type="checkbox" id="rememberPwd" />
            <span class="remember-box" aria-hidden="true"><i class="fa-solid fa-check"></i></span>
            <span class="remember-label" data-i18n="login.remember"></span>
          </label>
          <button type="submit" class="btn btn-primary btn-lg w-full" id="loginBtn">
            <i class="fa-solid fa-arrow-right-to-bracket" data-login-icon aria-hidden="true"></i>
            <span data-i18n="login.submit" data-login-label></span>
          </button>
        </form>
        <div class="login-card-footer">
          <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
          <span data-i18n="login.secureNote"></span>
        </div>
      </div>
    </main>
  </div>

  <!-- Main app -->
  <div id="mainPage" class="app-shell hidden">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand">
          <img class="brand-icon" src="/admin/favicon.ico" alt="" />
          <span class="brand-text">Kiro-Go</span>
        </div>
        <button class="icon-btn sidebar-close" id="sidebarClose" type="button" aria-label=""
          data-i18n-aria-label="common.close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <nav class="sidebar-nav" id="sidebarNav" aria-label="" data-i18n-aria-label="aria.sections">
        <button type="button" class="nav-item active" data-view="overview"><i
            class="fa-solid fa-gauge nav-icon"></i><span data-i18n="nav.overview"></span></button>

        <div class="nav-group-label" data-i18n="nav.providers"></div>
        <button type="button" class="nav-item" data-view="providers"><i class="fa-solid fa-grip nav-icon"></i><span
            data-i18n="nav.providersGrid"></span></button>

        <div class="nav-group-label" data-i18n="nav.system"></div>
        <button type="button" class="nav-item" data-view="usage"><i class="fa-solid fa-coins nav-icon"></i><span
            data-i18n="nav.usage"></span></button>
        <button type="button" class="nav-item" data-view="apikeys"><i class="fa-solid fa-key nav-icon"></i><span
            data-i18n="nav.apikeys"></span></button>
        <button type="button" class="nav-item" data-view="settings"><i class="fa-solid fa-sliders nav-icon"></i><span
            data-i18n="tabs.settings"></span></button>
        <button type="button" class="nav-item" data-view="api"><i class="fa-solid fa-plug nav-icon"></i><span
            data-i18n="tabs.api"></span></button>
        <button type="button" class="nav-item" data-view="logs"><i class="fa-solid fa-list nav-icon"></i><span
            data-i18n="tabs.logs"></span></button>
      </nav>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    <!-- Main area -->
    <div class="main-area">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-btn sidebar-toggle" id="sidebarToggle" type="button" aria-label=""
            data-i18n-aria-label="aria.sections"><i class="fa-solid fa-bars"></i></button>
          <h1 class="topbar-title" id="viewTitle" data-i18n="nav.overview"></h1>
        </div>
        <div class="topbar-actions flex-wrap justify-end">
          <div class="lang-switch" id="mainLangSwitch" role="group" aria-label="" data-i18n-aria-label="lang.label">
            <button class="lang-btn" data-lang="zh" type="button" data-i18n="lang.zh"></button>
            <button class="lang-btn" data-lang="en" type="button" data-i18n="lang.en"></button>
            <button class="lang-btn" data-lang="vi" type="button" data-i18n="lang.vi"></button>
          </div>
          <button id="mainThemeToggle" class="icon-btn theme-toggle" type="button" aria-label=""
            data-i18n-title="theme.toggle" data-i18n-aria-label="theme.toggle" data-theme="system">
            <i class="fa-solid fa-circle-half-stroke theme-ico-system"></i>
            <i class="fa-solid fa-sun theme-ico-light"></i>
            <i class="fa-solid fa-moon theme-ico-dark"></i>
          </button>
          <span class="divider" aria-hidden="true"></span>
          <button class="btn btn-outline btn-sm" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span data-i18n="common.logout"></span>
          </button>
        </div>
      </header>

    <div class="container">
      <!-- Overview view -->
      <div id="viewOverview" class="view">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.accounts"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value" id="statAccounts">0</div>
              <div class="stat-sub">
                <span class="stat-sub-sec"><span class="stat-value-sm" id="statCredits">0</span> <span
                    class="stat-label" data-i18n="stats.credits"></span></span>
              </div>
            </div>
            <i class="fa-solid fa-users stat-icon" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.requests"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value" id="statRequests">0</div>
              <div class="stat-sub">
                <span class="stat-sub-sec"><span class="stat-value-sm" id="statTokens">0</span> <span class="stat-label"
                    data-i18n="stats.tokens"></span></span>
              </div>
            </div>
            <i class="fa-solid fa-route stat-icon" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.success"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value" id="statSuccess">0</div>
              <div class="stat-sub"><span class="stat-label" data-i18n="stats.completed"></span></div>
            </div>
            <i class="fa-solid fa-circle-check stat-icon" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.failed"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value stat-value--danger" id="statFailed">0</div>
              <div class="stat-sub">
                <span class="stat-label" data-i18n="stats.errors"></span>
              </div>
            </div>
            <i class="fa-solid fa-circle-xmark stat-icon stat-icon--danger" aria-hidden="true"></i>
          </div>
        </div>
      </div>

      <div class="card overview-apikeys" id="overviewApiKeys">
        <div class="card-header">
          <span class="card-title" data-i18n="stats.apiKeysTitle"></span>
          <div class="card-actions">
            <button type="button" class="btn btn-outline btn-sm" id="overviewManageKeysBtn">
              <i class="fa-solid fa-key" aria-hidden="true"></i>
              <span class="btn-text" data-i18n="stats.apiKeysManage"></span>
            </button>
          </div>
        </div>

        <div class="stats-grid api-key-stats-grid">
          <div class="stat-card">
            <div class="stat-card-title" data-i18n="stats.apiKeysTotal"></div>
            <div class="stat-body">
              <div class="stat-main">
                <div class="stat-value" id="statApiKeysTotal">0</div>
                <div class="stat-sub">
                  <span class="stat-label" id="statApiKeysCreated7dLabel">0 new / 7d</span>
                </div>
              </div>
              <i class="fa-solid fa-key stat-icon" aria-hidden="true"></i>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card-title" data-i18n="stats.apiKeysActive"></div>
            <div class="stat-body">
              <div class="stat-main">
                <div class="stat-value" id="statApiKeysActive">0</div>
                <div class="stat-sub">
                  <span class="stat-label" id="statApiKeysDisabledLabel">0 disabled</span>
                </div>
              </div>
              <i class="fa-solid fa-circle-check stat-icon" aria-hidden="true"></i>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card-title" data-i18n="stats.apiKeysExpired"></div>
            <div class="stat-body">
              <div class="stat-main">
                <div class="stat-value" id="statApiKeysExpired">0</div>
                <div class="stat-sub">
                  <span class="stat-label" id="statApiKeysExpiringSoonLabel">0 expiring soon</span>
                </div>
              </div>
              <i class="fa-solid fa-hourglass-end stat-icon" aria-hidden="true"></i>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card-title" data-i18n="stats.apiKeysRequests"></div>
            <div class="stat-body">
              <div class="stat-main">
                <div class="stat-value" id="statApiKeysRequests">0</div>
                <div class="stat-sub">
                  <span class="stat-sub-sec"><span class="stat-value-sm" id="statApiKeysTokens">0</span> <span
                      class="stat-label" data-i18n="stats.tokens"></span></span>
                </div>
              </div>
              <i class="fa-solid fa-chart-simple stat-icon" aria-hidden="true"></i>
            </div>
          </div>
        </div>

        <div class="overview-key-visuals">
          <section class="overview-key-panel" aria-labelledby="apiKeyStatusTitle">
            <h3 id="apiKeyStatusTitle" class="overview-key-panel-title" data-i18n="stats.apiKeysStatusTitle"></h3>
            <div id="apiKeyStatusBar" class="overview-status-bar" role="img" aria-label=""></div>
            <ul id="apiKeyStatusLegend" class="overview-status-legend"></ul>
          </section>
          <section class="overview-key-panel" aria-labelledby="apiKeyCreatedTitle">
            <h3 id="apiKeyCreatedTitle" class="overview-key-panel-title" data-i18n="stats.apiKeysCreatedTitle"></h3>
            <div id="apiKeyCreatedChart" class="overview-created-chart" role="img" aria-label=""></div>
            <p id="apiKeyCreatedSummary" class="overview-created-summary muted-text"></p>
          </section>
        </div>

        <div class="overview-key-top">
          <h3 class="overview-key-panel-title" data-i18n="stats.apiKeysTopTitle"></h3>
          <div id="apiKeyTopTable"></div>
        </div>
      </div>
      </div>

      <!-- Providers landing view -->
      <div id="viewProviders" class="view hidden">
        <div class="provider-grid" id="providerGrid"></div>
      </div>

      <!-- Accounts view -->
      <div id="viewAccounts" class="view hidden">
        <div class="card">
          <div class="card-header">
            <button class="btn btn-outline btn-sm hidden" id="backToProvidersBtn"><i class="fa-solid fa-arrow-left"
                aria-hidden="true"></i><span class="btn-text" data-i18n="providers.back"></span></button>
            <span class="card-title" data-i18n="accounts.title"></span>
            <div class="card-actions">
              <label class="flex items-center gap-2 cursor-pointer select-none" title=""
                data-i18n-title="privacy.tooltip">
                <span class="text-xs font-medium" data-i18n="privacy.label"></span>
                <span class="switch"><input type="checkbox" id="privacyModeToggle" checked /><span
                    class="slider"></span></span>
              </label>
              <button class="btn btn-outline btn-sm" id="exportBtn"><i class="fa-solid fa-file-export"
                  aria-hidden="true"></i><span class="btn-text" data-i18n="accounts.export"></span></button>
              <button class="btn btn-outline btn-sm" id="refreshAllModelsBtn"><i class="fa-solid fa-arrows-rotate"
                  aria-hidden="true"></i><span class="btn-text" data-i18n="models.refreshAll"></span></button>
              <button class="btn btn-primary btn-sm" id="addAccountBtn"><i class="fa-solid fa-plus"
                  aria-hidden="true"></i><span class="btn-text" data-i18n="accounts.add"></span></button>
            </div>
          </div>

          <div id="providerModelsPanel" class="provider-models-panel hidden">
            <details class="provider-models-details" open>
              <summary class="provider-models-summary">
                <span class="provider-models-title">
                  <i class="fa-solid fa-layer-group" aria-hidden="true"></i>
                  <span data-i18n="providers.supportedModels">Supported Models</span>
                </span>
                <span class="provider-models-count" id="providerModelsCount"></span>
                <i class="fa-solid fa-chevron-down provider-models-chevron" aria-hidden="true"></i>
              </summary>
              <p class="provider-models-hint" data-i18n="providers.modelsHint">Copy a model ID to use with API requests.</p>
              <div class="provider-models-toolbar">
                <input type="text" id="providerModelsSearch" class="provider-models-search" data-i18n-placeholder="providers.searchModels" placeholder="Search models…" />
              </div>
              <div id="providerModelsList" class="provider-models-list"></div>
            </details>
          </div>

          <div class="toolbar">
            <label class="flex items-center gap-1.5 cursor-pointer select-none shrink-0">
              <input type="checkbox" id="selectAllCheckbox" />
              <span class="text-xs" data-i18n="batch.selectAll"></span>
            </label>
            <div id="batchBar" class="batch-bar hidden">
              <span id="batchCount" class="batch-count"></span>
              <button class="btn btn-primary btn-xs" data-batch="enable" data-i18n="batch.enable"></button>
              <button class="btn btn-secondary btn-xs" data-batch="disable" data-i18n="batch.disable"></button>
              <button class="btn btn-secondary btn-xs" data-batch="refresh" data-i18n="batch.refresh"></button>
              <button class="btn btn-secondary btn-xs" data-batch="refreshModels"
                data-i18n="batch.refreshModels"></button>
              <button class="btn btn-danger btn-xs" data-batch="delete" data-i18n="batch.delete"></button>
            </div>
            <div class="toolbar-spacer"></div>
            <input type="text" id="filterSearch" class="w-56!" data-i18n-placeholder="filter.search" />
            <select id="filterStatusSelect" class="w-32!" data-i18n-aria-label="filter.status">
              <option value="all" data-i18n="filter.all"></option>
              <option value="enabled" data-i18n="filter.enabled"></option>
              <option value="disabled" data-i18n="filter.disabled"></option>
              <option value="banned" data-i18n="filter.banned"></option>
            </select>
          </div>

          <div id="accountsList"></div>
        </div>
      </div>

      <!-- Token Usage view -->
      <div id="viewUsage" class="view hidden">
        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="nav.usage"></span></div>
          <div id="usageContent"></div>
        </div>
      </div>

      <!-- API Keys view -->
      <div id="viewApikeys" class="view hidden">
        <div class="card api-access-card">
          <div class="card-header">
            <span class="card-title" data-i18n="settings.apiSettings"></span>
          </div>
          <div class="form-group api-access-row">
            <label class="api-key-switch-row">
              <span class="switch"><input type="checkbox" id="requireApiKey" /><span class="slider"></span></span>
              <span data-i18n="settings.enableApiKey"></span>
            </label>
            <small data-i18n="apiKeys.requireHint"></small>
          </div>
          <button class="btn btn-primary btn-sm" id="saveRequireApiKeyBtn" data-i18n="settings.saveApiKey"></button>
        </div>


        <div class="card security-card" id="securityCard">
          <div class="card-header">
            <span class="card-title" data-i18n="security.title"></span>
          </div>
          <div class="form-group">
            <label class="api-key-switch-row">
              <span class="switch"><input type="checkbox" id="securityTrustProxy" /><span class="slider"></span></span>
              <span data-i18n="security.trustProxy"></span>
            </label>
            <small data-i18n="security.trustProxyHint"></small>
          </div>
          <button class="btn btn-primary btn-sm" id="saveSecurityBtn" type="button" data-i18n="common.save"></button>
          <div class="security-blocked-section">
            <h3 class="overview-key-panel-title" data-i18n="security.blockedTitle"></h3>
            <div class="security-block-form">
              <input type="text" id="securityBlockIP" data-i18n-placeholder="security.ipPlaceholder" autocomplete="off" />
              <input type="text" id="securityBlockReason" data-i18n-placeholder="security.reasonPlaceholder" autocomplete="off" />
              <button class="btn btn-danger btn-sm" id="securityBlockBtn" type="button" data-i18n="security.blockIP"></button>
            </div>
            <div id="blockedIPsList" class="blocked-ips-list"></div>
          </div>
        </div>

        <div class="card api-keys-card">
          <div class="card-header">
            <span class="card-title" data-i18n="apiKeys.listTitle"></span>
            <div class="card-actions">
              <button class="btn btn-outline btn-sm" id="addApiKeyBtn" type="button">
                <i class="fa-solid fa-plus"></i>
                <span data-i18n="apiKeys.add"></span>
              </button>
            </div>
          </div>
          <p class="api-keys-hint" data-i18n="apiKeys.listHint"></p>
          <div class="api-keys-toolbar">
            <div class="api-keys-toolbar-row api-keys-toolbar-filters">
              <input type="search" id="apiKeysSearch" class="api-keys-search" data-i18n-placeholder="apiKeys.searchPlaceholder" autocomplete="off" />
              <select id="apiKeysStatusFilter" class="api-keys-status-filter" data-i18n-aria-label="apiKeys.filterStatus">
                <option value="all" data-i18n="apiKeys.filterAll"></option>
                <option value="enabled" data-i18n="apiKeys.filterEnabled"></option>
                <option value="disabled" data-i18n="apiKeys.filterDisabled"></option>
                <option value="expired" data-i18n="apiKeys.filterExpired"></option>
              </select>
            </div>
            <div class="api-keys-toolbar-row api-keys-toolbar-meta">
              <label class="api-keys-page-size-label">
                <span data-i18n="apiKeys.pageSize"></span>
                <select id="apiKeysPageSize" aria-label="page size">
                  <option value="10">10</option>
                  <option value="20" selected>20</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
              </label>
            </div>
          </div>
          <div id="apiKeysList" class="api-keys-list"></div>
        </div>
      </div>

      <!-- Settings view -->
      <div id="viewSettings" class="view hidden">
        <!-- Usage settings -->
        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="settings.usageSettings"></span></div>
          <div class="form-group">
            <label class="flex items-center gap-2">
              <span class="switch"><input type="checkbox" id="allowOverUsage" /><span class="slider"></span></span>
              <span data-i18n="settings.allowOverUsage"></span>
            </label>
            <small data-i18n="settings.allowOverUsageHint"></small>
          </div>
          <button class="btn btn-primary" id="saveOverUsageBtn" data-i18n="settings.saveUsage"></button>
        </div>

        <!-- Thinking settings -->
        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="settings.thinkingSettings"></span></div>
          <div class="form-group">
            <label data-i18n="settings.thinkingSuffix"></label>
            <input type="text" id="thinkingSuffix" placeholder="-thinking" />
            <small data-i18n="settings.thinkingSuffixHint"></small>
          </div>
          <div class="form-group">
            <label data-i18n="settings.openaiFormat"></label>
            <select id="openaiThinkingFormat">
              <option value="reasoning_content" data-i18n="settings.formatReasoningContent"></option>
              <option value="thinking" data-i18n="settings.formatThinkingClaude"></option>
              <option value="think" data-i18n="settings.formatThinkOpenAI"></option>
            </select>
          </div>
          <div class="form-group">
            <label data-i18n="settings.claudeFormat"></label>
            <select id="claudeThinkingFormat">
              <option value="thinking" data-i18n="settings.formatThinkingClaude"></option>
              <option value="think" data-i18n="settings.formatThinkOpenAI"></option>
            </select>
          </div>
          <button class="btn btn-primary" id="saveThinkingBtn" data-i18n="settings.saveThinking"></button>
        </div>

        <!-- Endpoint settings -->
        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="settings.endpointSettings"></span></div>
          <div class="form-group">
            <label data-i18n="settings.preferredEndpoint"></label>
            <select id="preferredEndpoint">
              <option value="auto" data-i18n="settings.endpointAuto"></option>
              <option value="kiro" data-i18n="settings.endpointKiro"></option>
              <option value="codewhisperer" data-i18n="settings.endpointCodeWhisperer"></option>
              <option value="amazonq" data-i18n="settings.endpointAmazonQ"></option>
            </select>
            <small data-i18n="settings.endpointHint"></small>
          </div>
          <div class="form-group">
            <label class="flex items-center gap-2">
              <span class="switch"><input type="checkbox" id="endpointFallback" checked /><span
                  class="slider"></span></span>
              <span data-i18n="settings.endpointFallback"></span>

              <div class="endpoint api-code-row"><span class="api-code" id="statsEndpoint"></span><button
