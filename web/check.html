<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiro · Kiểm tra API Key</title>
<link rel="icon" href="/admin/favicon.ico">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-2: #222634;
    --border: #2c3140;
    --text: #e6e8ee;
    --muted: #9aa0ad;
    --accent: #6d8bff;
    --ok: #34d399;
    --warn: #fbbf24;
    --err: #f87171;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 32px 20px 64px; }
  h1 { font-size: 1.6rem; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 28px; font-size: 0.95rem; }

  .lookup {
    display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap;
  }
  .lookup input {
    flex: 1 1 320px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: var(--radius);
    font-size: 0.95rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .lookup input:focus { outline: none; border-color: var(--accent); }
  .lookup button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 22px;
    border-radius: var(--radius);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }
  .lookup button:disabled { opacity: 0.6; cursor: default; }

  .msg { padding: 12px 16px; border-radius: var(--radius); margin-bottom: 20px; display: none; }
  .msg.err { background: rgba(248,113,113,.12); border: 1px solid var(--err); color: var(--err); display: block; }

  #result { display: none; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .card .label { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
  .card .value { font-size: 1.35rem; font-weight: 700; }
  .card .value small { font-size: 0.85rem; font-weight: 500; color: var(--muted); }

  .bar { height: 6px; border-radius: 6px; background: var(--card-2); margin-top: 12px; overflow: hidden; }
  .bar > span { display: block; height: 100%; background: var(--accent); border-radius: 6px; }

  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
  .pill.ok { background: rgba(52,211,153,.15); color: var(--ok); }
  .pill.warn { background: rgba(251,191,36,.15); color: var(--warn); }
  .pill.err { background: rgba(248,113,113,.15); color: var(--err); }

  .meta { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 18px; margin-bottom: 24px; }
  .meta .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.92rem; }
  .meta .row:last-child { border-bottom: none; }
  .meta .row .k { color: var(--muted); }
  .meta .row .v { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

  h2 { font-size: 1.1rem; margin: 0 0 12px; }
  .table-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { background: var(--card-2); color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: .03em; }
  tbody tr:last-child td { border-bottom: none; }
  td.num { text-align: right; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .empty { padding: 24px; text-align: center; color: var(--muted); }
  .st-ok { color: var(--ok); }
  .st-err { color: var(--err); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Kiểm tra API Key</h1>
  <p class="sub">Nhập API key của bạn để xem credit còn lại, hạn sử dụng và lịch sử dùng.</p>

  <form class="lookup" id="lookupForm">
    <input id="keyInput" type="password" autocomplete="off" spellcheck="false"
           placeholder="Dán API key (sk-...) vào đây" />
    <button type="submit" id="submitBtn">Kiểm tra</button>
  </form>

  <div class="msg err" id="errMsg"></div>

  <div id="result">
    <div class="cards" id="cards"></div>
    <div class="meta" id="meta"></div>

    <h2>Lịch sử sử dụng</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Thời gian</th><th>Loại</th><th>Model</th><th>Trạng thái</th>
            <th style="text-align:right">Tokens</th><th style="text-align:right">Credits</th><th style="text-align:right">Thời lượng</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const form = document.getElementById('lookupForm');
const keyInput = document.getElementById('keyInput');
const submitBtn = document.getElementById('submitBtn');
const errMsg = document.getElementById('errMsg');
const result = document.getElementById('result');

function fmtNum(n) { return (n ?? 0).toLocaleString('vi-VN'); }
function fmtCredit(n) { return (n ?? 0).toLocaleString('vi-VN', { maximumFractionDigits: 2 }); }
function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts * 1000).toLocaleString('vi-VN');
}
// expiresAt lưu là 00:00 ngày kế tiếp; lùi 1s để về đúng ngày hết hạn (giống admin).
function fmtExpiry(ts) {
  if (!ts) return '—';
  return new Date(ts * 1000 - 1000).toLocaleDateString('vi-VN');
}
function fmtDuration(ms) {
  if (!ms) return '—';
  if (ms < 1000) return ms + ' ms';
  return (ms / 1000).toFixed(1) + ' s';
}

function showError(text) {
  errMsg.textContent = text;
  errMsg.style.display = 'block';
  result.style.display = 'none';
}

function statusPill(data) {
  if (!data.enabled) return '<span class="pill err">Đã tắt</span>';
  if (data.expired) return '<span class="pill err">Hết hạn</span>';
  return '<span class="pill ok">Đang hoạt động</span>';
}

function creditCard(data) {
  if (data.creditUnlimited) {
    return `<div class="card">
      <div class="label">Credit</div>
      <div class="value">${fmtCredit(data.creditsUsed)} <small>đã dùng</small></div>
      <div style="margin-top:8px"><span class="pill ok">Không giới hạn</span></div>
    </div>`;
  }
  const pct = data.creditLimit > 0 ? Math.min(100, (data.creditsUsed / data.creditLimit) * 100) : 0;
  const barColor = pct >= 90 ? 'var(--err)' : pct >= 70 ? 'var(--warn)' : 'var(--accent)';
  return `<div class="card">
    <div class="label">Credit còn lại</div>
    <div class="value">${fmtCredit(data.creditsRemaining)} <small>/ ${fmtCredit(data.creditLimit)}</small></div>
    <div class="bar"><span style="width:${pct}%;background:${barColor}"></span></div>
    <div style="margin-top:8px;color:var(--muted);font-size:.82rem">Đã dùng ${fmtCredit(data.creditsUsed)}</div>
  </div>`;
}

function tokenCard(data) {
  if (data.tokenUnlimited) {
    return `<div class="card">
      <div class="label">Tokens</div>
      <div class="value">${fmtNum(data.tokensUsed)} <small>đã dùng</small></div>
      <div style="margin-top:8px"><span class="pill ok">Không giới hạn</span></div>
    </div>`;
  }
  const pct = data.tokenLimit > 0 ? Math.min(100, (data.tokensUsed / data.tokenLimit) * 100) : 0;
  const barColor = pct >= 90 ? 'var(--err)' : pct >= 70 ? 'var(--warn)' : 'var(--accent)';
  return `<div class="card">
    <div class="label">Tokens còn lại</div>
    <div class="value">${fmtNum(data.tokensRemaining)} <small>/ ${fmtNum(data.tokenLimit)}</small></div>
    <div class="bar"><span style="width:${pct}%;background:${barColor}"></span></div>
    <div style="margin-top:8px;color:var(--muted);font-size:.82rem">Đã dùng ${fmtNum(data.tokensUsed)}</div>
  </div>`;
}

function expiryCard(data) {
  if (data.neverExpires) {
    return `<div class="card">
      <div class="label">Hạn sử dụng</div>
      <div class="value" style="font-size:1.1rem">Vĩnh viễn</div>
      <div style="margin-top:8px"><span class="pill ok">Không hết hạn</span></div>
    </div>`;
  }
  const pill = data.expired
    ? '<span class="pill err">Hết hạn</span>'
    : `<span class="pill ${data.daysRemaining <= 3 ? 'warn' : 'ok'}">Còn ${data.daysRemaining} ngày</span>`;
  return `<div class="card">
    <div class="label">Hạn sử dụng</div>
    <div class="value" style="font-size:1.1rem">${fmtExpiry(data.expiresAt)}</div>
    <div style="margin-top:8px">${pill}</div>
  </div>`;
}

function render(data) {
  errMsg.style.display = 'none';

  document.getElementById('cards').innerHTML =
    creditCard(data) + tokenCard(data) + expiryCard(data);

  document.getElementById('meta').innerHTML = `
    <div class="row"><span class="k">API key</span><span class="v">${data.keyMasked || '—'}</span></div>
    ${data.name ? `<div class="row"><span class="k">Tên</span><span class="v">${escapeHtml(data.name)}</span></div>` : ''}
    <div class="row"><span class="k">Trạng thái</span><span class="v">${statusPill(data)}</span></div>
    <div class="row"><span class="k">Tổng số request</span><span class="v">${fmtNum(data.requestsCount)}</span></div>
    <div class="row"><span class="k">Tạo lúc</span><span class="v">${fmtDate(data.createdAt)}</span></div>
    <div class="row"><span class="k">Dùng gần nhất</span><span class="v">${fmtDate(data.lastUsedAt)}</span></div>
  `;

  const logs = data.logs || [];
  const body = document.getElementById('logBody');
  if (logs.length === 0) {
    body.innerHTML = `<tr><td colspan="7" class="empty">Chưa có lịch sử sử dụng</td></tr>`;
  } else {
    body.innerHTML = logs.map(l => {
      const ok = l.status === 'success';
      const statusCell = ok
        ? '<span class="st-ok">Thành công</span>'
        : `<span class="st-err">${escapeHtml(l.errorType || 'Lỗi')}</span>`;
      return `<tr>
        <td>${fmtDate(l.time)}</td>
        <td>${escapeHtml(l.endpoint || '—')}</td>
        <td>${escapeHtml(l.model || '—')}</td>
        <td>${statusCell}</td>
        <td class="num">${fmtNum(l.tokens)}</td>
        <td class="num">${fmtCredit(l.credits)}</td>
        <td class="num">${fmtDuration(l.duration)}</td>
      </tr>`;
    }).join('');
  }

  result.style.display = 'block';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const key = keyInput.value.trim();
  if (!key) { showError('Vui lòng nhập API key'); return; }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Đang kiểm tra...';
  try {
    const res = await fetch('/check/api/lookup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key })
    });
    const data = await res.json();
    if (!res.ok) {
      showError(data.error || 'Không tra được key');
      return;
    }
    render(data);
  } catch (err) {
    showError('Lỗi kết nối: ' + err.message);
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Kiểm tra';
  }
});
</script>
</body>
</html>
